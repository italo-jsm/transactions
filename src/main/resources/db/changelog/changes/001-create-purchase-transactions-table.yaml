databaseChangeLog:
  - changeSet:
      id: 001-create-purchase-transactions-table
      author: codex
      changes:
        - createTable:
            tableName: purchase_transactions
            columns:
              - column:
                  name: purchase_id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_purchase_transactions
              - column:
                  name: description
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: purchase_amount
                  type: DECIMAL(14,2)
                  constraints:
                    nullable: false
