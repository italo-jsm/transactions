spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydb}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

treasury:
  api:
    base-url: ${TREASURY_API_URL:https://api.fiscaldata.treasury.gov/services/api/fiscal_service}
    path: ${TREASURY_API_PATH:/v1/accounting/od/rates_of_exchange}
    timeout: ${TREASURY_API_TIMEOUT:3s}


logging:
  level:
    liquibase: INFO
    org.springframework.boot.autoconfigure.liquibase: DEBUG
